<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen 63 | Order Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #f9f9f9; }
        .serif { font-family: 'Playfair Display', serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden antialiased bg-[#050505]">

<!-- Main Menu Area -->
<main class="flex-1 flex flex-col min-w-0 h-screen">
    <!-- Navbar -->
    <header class="h-16 border-b border-white/10 flex items-center justify-between px-6 bg-[#0a0a0a] shrink-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="hover:opacity-80 transition-opacity">
                <div class="h-8 w-8 rounded-full border border-blue-500/50 flex items-center justify-center text-[10px] font-bold text-blue-400 bg-zinc-900">Z63</div>
            </a>
            <h1 class="text-sm font-bold tracking-widest uppercase text-white hidden sm:block">Online Ordering</h1>
        </div>

        <div class="flex items-center gap-4">
            <!-- Mobile Cart Toggle Button -->
            <button id="mobileCartBtn" class="md:hidden flex items-center gap-2 bg-blue-600/10 border border-blue-500/30 text-blue-400 px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-colors">
                Cart <span id="mobileCartBadge" class="bg-blue-500 text-white px-1.5 py-0.5 rounded-full leading-none">0</span>
            </button>
            <a href="../login/login.html" class="text-xs uppercase tracking-widest text-gray-400 hover:text-white font-semibold hidden sm:block">Sign In</a>
        </div>
    </header>

    <!-- Menu Content -->
    <div class="flex-1 overflow-y-auto p-6 md:p-10">
        <div class="max-w-5xl mx-auto pb-20">
            <h2 class="text-3xl md:text-4xl serif mb-2">Our Menu</h2>
            <p class="text-gray-400 text-xs md:text-sm mb-8 border-b border-white/10 pb-6">Add items to your cart for pickup or table service.</p>

            <!-- Loading State -->
            <div id="loading" class="text-center py-20 text-blue-500 animate-pulse text-sm font-bold uppercase tracking-widest">
                Loading live catalog...
            </div>

            <!-- Catalog Grid -->
            <div id="catalogGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
                <!-- Items rendered via JS -->
            </div>
        </div>
    </div>
</main>

<!-- Mobile Overlay -->
<div id="cartOverlay" class="fixed inset-0 bg-black/80 z-[90] hidden md:hidden backdrop-blur-sm transition-opacity"></div>

<!-- Cart Sidebar (Drawer on Mobile, Sidebar on Desktop) -->
<aside id="cartSidebar" class="fixed inset-y-0 right-0 z-[100] w-full max-w-sm md:max-w-none md:w-96 bg-[#0a0a0a] border-l border-white/10 flex flex-col h-screen transform translate-x-full md:translate-x-0 transition-transform duration-300 shadow-2xl md:relative">
    <div class="p-6 border-b border-white/10 bg-[#0a0a0a] flex justify-between items-center shrink-0">
        <div>
            <h3 class="text-lg serif font-bold">Your Cart</h3>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1" id="cartCount">0 Items</p>
        </div>
        <!-- Mobile Close Button -->
        <button id="closeCartBtn" class="md:hidden text-gray-400 hover:text-white p-2 focus:outline-none">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
    </div>

    <!-- Cart Items -->
    <div class="flex-1 overflow-y-auto p-6 space-y-4" id="cartItems">
        <div class="text-center text-gray-600 text-xs italic py-10">Your cart is empty.</div>
    </div>

    <!-- Checkout Footer -->
    <div class="p-6 border-t border-white/10 bg-[#0a0a0a] shrink-0">
        <div class="flex justify-between items-center mb-6">
            <span class="text-sm text-gray-400 uppercase tracking-widest font-semibold">Total</span>
            <span class="text-2xl font-serif text-white font-bold" id="cartTotal">R 0.00</span>
        </div>

        <div id="orderFeedback" class="hidden mb-4 p-3 text-[10px] uppercase tracking-widest rounded border font-bold text-center"></div>

        <form id="checkoutForm" class="space-y-4">
            <input type="text" id="custName" required placeholder="Your Name" class="w-full bg-black border border-white/10 p-3 rounded text-sm outline-none focus:border-blue-500">
            <input type="email" id="custEmail" required placeholder="Email Address" class="w-full bg-black border border-white/10 p-3 rounded text-sm outline-none focus:border-blue-500">

            <button type="submit" id="checkoutBtn" disabled class="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:hover:bg-blue-600 text-white font-bold py-4 rounded uppercase tracking-[0.2em] text-xs transition-all shadow-lg shadow-blue-500/20">
                Submit Order
            </button>
        </form>
    </div>
</aside>

<script>
    const tenantId = '11111111-1111-1111-1111-111111111111';
    let catalog = [];
    let cart = [];

    // --- Mobile Drawer Logic ---
    const mobileCartBtn = document.getElementById('mobileCartBtn');
    const closeCartBtn = document.getElementById('closeCartBtn');
    const cartSidebar = document.getElementById('cartSidebar');
    const cartOverlay = document.getElementById('cartOverlay');

    function toggleCart() {
        const isClosed = cartSidebar.classList.contains('translate-x-full');
        if (isClosed) {
            cartSidebar.classList.remove('translate-x-full');
            cartOverlay.classList.remove('hidden');
        } else {
            cartSidebar.classList.add('translate-x-full');
            cartOverlay.classList.add('hidden');
        }
    }

    mobileCartBtn.addEventListener('click', toggleCart);
    closeCartBtn.addEventListener('click', toggleCart);
    cartOverlay.addEventListener('click', toggleCart);
    // ---------------------------

    async function loadCatalog() {
        try {
            const res = await fetch(`http://localhost:7070/api/private/catalog?tenantId=${tenantId}`);
            if (res.ok) {
                catalog = await res.json();
            } else { throw new Error(); }
        } catch (e) {
            console.warn("Backend down. Using mock data.");
            catalog = [
                // Fixed orderId to id so the JS can find it
                { id: '1', name: 'Famous Zen Wings', category: 'food', price: 85.00, description: 'Crispy signature wings.', isAvailable: true },
                { id: '2', name: 'Beef Stew & Dumplings', category: 'food', price: 100.00, description: 'Traditional comfort.', isAvailable: true },
                { id: '3', name: 'Wash & Go', category: 'car_wash', price: 40.00, description: 'Quick exterior wash.', isAvailable: true }
            ];
        }
        renderCatalog();
    }

    function renderCatalog() {
        document.getElementById('loading').classList.add('hidden');
        const grid = document.getElementById('catalogGrid');
        grid.classList.remove('hidden');
        grid.innerHTML = '';

        catalog.filter(i => i.isAvailable).forEach(item => {
            grid.innerHTML += `
                    <div class="bg-[#121212] border border-white/5 p-5 md:p-6 rounded-xl hover:border-blue-500/30 transition-all flex flex-col">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[9px] uppercase tracking-widest font-bold text-gray-500 bg-white/5 px-2 py-1 rounded">${item.category.replace('_', ' ')}</span>
                            <span class="font-serif font-bold text-blue-400">R ${item.price.toFixed(2)}</span>
                        </div>
                        <h3 class="text-base md:text-lg font-bold text-white mb-2 leading-tight">${item.name}</h3>
                        <p class="text-xs text-gray-400 mb-6 leading-relaxed flex-1">${item.description || ''}</p>
                        <button onclick="addToCart('${item.id}')" class="w-full border border-white/10 hover:bg-white/10 text-white font-semibold py-2 rounded text-xs uppercase tracking-widest transition-colors">
                            Add to Order
                        </button>
                    </div>
                `;
        });
    }

    function addToCart(id) {
        const item = catalog.find(i => i.id === id);
        if (!item) return; // safety check
        const existing = cart.find(i => i.item.id === id);
        if (existing) { existing.qty += 1; }
        else { cart.push({ item, qty: 1 }); }
        renderCart();
    }

    function updateQty(id, delta) {
        const item = cart.find(i => i.item.id === id);
        if (item) {
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(i => i.item.id !== id);
            renderCart();
        }
    }

    function renderCart() {
        const container = document.getElementById('cartItems');
        const totalEl = document.getElementById('cartTotal');
        const countEl = document.getElementById('cartCount');
        const badgeEl = document.getElementById('mobileCartBadge');
        const btn = document.getElementById('checkoutBtn');

        if (cart.length === 0) {
            container.innerHTML = `<div class="text-center text-gray-600 text-xs italic py-10">Your cart is empty.</div>`;
            totalEl.innerText = 'R 0.00';
            countEl.innerText = '0 Items';
            badgeEl.innerText = '0';
            btn.disabled = true;
            return;
        }

        btn.disabled = false;
        let total = 0;
        let count = 0;
        container.innerHTML = cart.map(item => {
            total += item.item.price * item.qty;
            count += item.qty;
            return `
                    <div class="flex justify-between items-center bg-[#1a1a1a] p-3 rounded border border-white/5">
                        <div class="flex-1 min-w-0 pr-4">
                            <h4 class="text-sm font-bold text-white truncate">${item.item.name}</h4>
                            <p class="text-[10px] text-gray-400 font-mono">R ${item.item.price.toFixed(2)}</p>
                        </div>
                        <div class="flex items-center gap-3 bg-black rounded p-1 border border-white/10 shrink-0">
                            <button type="button" onclick="updateQty('${item.item.id}', -1)" class="w-6 h-6 flex items-center justify-center text-gray-400 hover:text-white transition-colors">-</button>
                            <span class="text-xs font-bold w-4 text-center">${item.qty}</span>
                            <button type="button" onclick="updateQty('${item.item.id}', 1)" class="w-6 h-6 flex items-center justify-center text-blue-400 hover:text-blue-300 transition-colors">+</button>
                        </div>
                    </div>
                `;
        }).join('');

        totalEl.innerText = `R ${total.toFixed(2)}`;
        countEl.innerText = `${count} Items`;
        badgeEl.innerText = count;

        // Slight pulse animation on the badge to draw attention
        badgeEl.classList.remove('animate-ping');
        void badgeEl.offsetWidth; // trigger reflow
        badgeEl.classList.add('animate-pulse');
    }

    function showFeedback(msg, isError = false) {
        const fb = document.getElementById('orderFeedback');
        fb.classList.remove('hidden', 'bg-blue-500/10', 'text-blue-400', 'border-blue-500/20', 'bg-red-500/10', 'text-red-400', 'border-red-500/20');
        fb.classList.add(isError ? 'bg-red-500/10' : 'bg-blue-500/10', isError ? 'text-red-400' : 'text-blue-400', isError ? 'border-red-500/20' : 'border-blue-500/20');
        fb.innerText = msg;

        // Hide after 4 seconds
        setTimeout(() => fb.classList.add('hidden'), 4000);
    }

    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('checkoutBtn');
        btn.innerText = "Processing...";

        const orderString = cart.map(i => `${i.qty}x ${i.item.name}`).join(', ');

        const payload = {
            IdMap: cart.reduce((acc, entry) => { acc[entry.item.id] = entry.qty; return acc;},{}),
            name: document.getElementById('custName').value,
            email: document.getElementById('custEmail').value,
            type: 'payfast',
            venue: "table",
            datetime: new Date().toISOString().slice(0, 19),
            details: `ITEMS: ${orderString}`,
            price: cart.reduce((a,b)=>a+(b.item.price*b.qty),0)
        };

        try {
            const res = await fetch(`http://localhost:7070/api/new-order?tenantId=${tenantId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                showFeedback("Order sent to kitchen!");
                cart = []; renderCart(); e.target.reset();
            } else throw new Error();
        } catch (err) {
            showFeedback("Offline Fallback: Order placed!");
            cart = []; renderCart(); e.target.reset();
        } finally {
            btn.innerText = "Submit Order";
            if(window.innerWidth < 768) setTimeout(toggleCart, 1500);
        }
    });

    loadCatalog();
</script>
</body>
</html>
